name: clainmexico-jarvis-development-environment
services:
  jarvis-node:
    container_name: jarvis-node
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
      - jarvis-pnpm-store:/root/.local/share/pnpm/store
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_NAME: ${APP_NAME:-J.A.R.V.I.S.}
      APP_ENV: ${APP_ENV:-local}
      APP_PORT: ${APP_PORT:-3000}
      APP_HOST: ${APP_HOST:-0.0.0.0}
    networks:
      - jarvis-network
    command: sh
    tty: true
    stdin_open: true
    depends_on:
      - jarvis-postgres
      - jarvis-redis
      - jarvis-mailpit

  jarvis-postgres:
    container_name: jarvis-postgres
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jarvis_dev}
      POSTGRES_USER: ${POSTGRES_USER:-jarvis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jarvis_dev_password}
    volumes:
      - jarvis-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - jarvis-network

  jarvis-mssql:
    container_name: jarvis-mssql
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    environment:
      ACCEPT_EULA: ${MSSQL_ACCEPT_EULA:-Y}
      MSSQL_PID: ${MSSQL_PID:-Developer}
      SA_PASSWORD: ${MSSQL_PASSWORD:-YourStrong!Passw0rd}
    volumes:
      - jarvis-mssql-data:/var/opt/mssql
      - ./docker/mssql/init:/docker-entrypoint-initdb.d
    networks:
      - jarvis-network
    profiles:
      - mssql
      - full

  jarvis-mysql:
    container_name: jarvis-mysql
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jarvis_dev}
      MYSQL_USER: ${MYSQL_USER:-jarvis}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-jarvis_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-jarvis_root_password}
    volumes:
      - jarvis-mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - jarvis-network
    profiles:
      - mysql
      - full

  jarvis-mongo:
    container_name: jarvis-mongo
    image: mongo:8
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-jarvis}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-jarvis_dev_password}
    volumes:
      - jarvis-mongo-data:/data/db
      - ./docker/mongo/init:/docker-entrypoint-initdb.d
    networks:
      - jarvis-network
    profiles:
      - mongo
      - full

  jarvis-redis:
    container_name: jarvis-redis
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - jarvis-redis-data:/data
    networks:
      - jarvis-network

  jarvis-mailpit:
    container_name: jarvis-mailpit
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MAIL_PORT:-1025}:1025"
      - "${MAIL_WEB_PORT:-8025}:8025"
    networks:
      - jarvis-network

  jarvis-minio:
    container_name: jarvis-minio
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-jarvis}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-jarvis_dev_password}
    volumes:
      - jarvis-minio-data:/data
    networks:
      - jarvis-network
    command: server /data --console-address ":9001"
    profiles:
      - storage
      - full

networks:
  jarvis-network:
    name: jarvis-network
    driver: bridge

volumes:
  jarvis-pnpm-store:
  jarvis-postgres-data:
  jarvis-mssql-data:
  jarvis-mysql-data:
  jarvis-mongo-data:
  jarvis-redis-data:
  jarvis-minio-data:
